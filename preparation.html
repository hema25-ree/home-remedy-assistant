<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Preparation</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4fff4;
padding:20px;
}

.card{
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
color:#2e7d32;
text-align:center;
}

</style>

</head>

<body>

<div class="card">

<h1 id="title"></h1>

<p id="content"></p>

<br>

<a href="javascript:history.back()">
⬅ Back
</a>

</div>

<script>

const item =
new URLSearchParams(window.location.search)
.get("item");

let title="";
let content="";

if(item=="coriander"){

title="🌿 Coriander Seed Water";

content=`

Ingredients:
• 1 tbsp coriander seeds
• 2 cups water

Preparation:
Boil water, add coriander seeds and simmer for 10 minutes.
Filter and drink warm.


தேவையான பொருட்கள்:
• 1 மேசைக்கரண்டி கொத்தமல்லி விதை
• 2 கப் தண்ணீர்

செய்முறை:
தண்ணீரை கொதிக்க வைத்து கொத்தமல்லி விதைகளை சேர்த்து 10 நிமிடம் கொதிக்க விடவும்.
பின்னர் வடிகட்டி சூடாக குடிக்கவும்.
`;

}

if(item=="gingertulsi"){

title="🌿 Ginger + Tulsi Tea";

content=`
Ingredients:
• 1 inch fresh ginger (crushed)
• 8–10 Tulsi leaves
• 2 cups water
• 1 teaspoon honey (optional)

Preparation:
1. Wash the tulsi leaves thoroughly.
2. Crush the ginger gently.
3. Boil 2 cups of water in a vessel.
4. Add the crushed ginger and tulsi leaves.
5. Allow it to simmer for 8–10 minutes.
6. Filter the tea into a cup.
7. Add honey if desired and drink warm.

தேவையான பொருட்கள்:
• 1 அங்குலம் இஞ்சி (நசுக்கியது)
• 8–10 துளசி இலைகள்
• 2 கப் தண்ணீர்
• 1 தேக்கரண்டி தேன் (விருப்பத்திற்கேற்ப)

செய்முறை:
1. துளசி இலைகளை நன்றாக கழுவவும்.
2. இஞ்சியை லேசாக நசுக்கவும்.
3. 2 கப் தண்ணீரை கொதிக்க வைக்கவும்.
4. அதில் இஞ்சி மற்றும் துளசி இலைகளை சேர்க்கவும்.
5. 8–10 நிமிடங்கள் நன்கு கொதிக்க விடவும்.
6. பின்னர் வடிகட்டி ஒரு கப்பில் ஊற்றவும்.
7. விருப்பமிருந்தால் தேன் சேர்த்து சூடாக குடிக்கவும்.
`;
}

document.getElementById("title").innerText=title;
document.getElementById("content").innerText=content;

</script>

</body>
</html>
