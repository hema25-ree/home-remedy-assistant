<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Namma Veetu Maruthuvam</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#e8f5e9,#f1f8e9);
    padding:20px;
}

/* Container */
.container{
    max-width:900px;
    margin:auto;
}

/* Back Button */
.back-btn{
    display:inline-block;
    margin-bottom:20px;
    padding:10px 18px;
    background:#2e7d32;
    color:white;
    text-decoration:none;
    border-radius:25px;
    font-weight:500;
    transition:0.3s;
}
.back-btn:hover{
    background:#1b5e20;
    transform:scale(1.05);
}

/* Main Card */
.card{
    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    animation:fadeIn 0.5s ease-in-out;
}

/* Title */
h1{
    color:#1b5e20;
    font-size:32px;
    text-align:center;
    margin-bottom:25px;
}

/* Section box */
.section{
    background:#f9fff9;
    padding:15px;
    border-left:5px solid #43a047;
    border-radius:10px;
    margin-bottom:15px;
    transition:0.3s;
}

.section:hover{
    transform:scale(1.02);
    background:#e8f5e9;
}

/* English text */
.section p{
    font-size:17px;
    margin:5px 0;
}

/* Tamil text */
.tamil{
    color:#444;
    font-size:16px;
    font-style:italic;
}

/* Simple animation */
@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

</style>

</head>

<body>

<div class="container">

<a href="index.html" class="back-btn">← Back to Home</a>

<div class="card">

<h1 id="title"></h1>

<div id="content"></div>

</div>

</div>

<script>

const diseases = {

fever:{
title:"🤒 Fever (காய்ச்சல்)",
content:`
<div class="section">
<p>Fever is a condition where body temperature increases due to infection or illness.</p>
<p class="tamil">காய்ச்சல் என்பது உடல் வெப்பம் அதிகரிக்கும் நிலை ஆகும்.</p>
</div>

<div class="section">
<p>Drink coriander seed water or raisin water to reduce body heat naturally.</p>
<p class="tamil">கொத்தமல்லி அல்லது உலர் திராட்சை நீர் குடிப்பது உடல் சூட்டை குறைக்க உதவுகிறது.</p>
</div>

<div class="section">
<p>Drink warm honey water to gain energy and relax the body.</p>
<p class="tamil">தேன் கலந்த சூடான நீர் உடலுக்கு சக்தி அளித்து நிம்மதி தருகிறது.</p>
</div>

<div class="section">
<p>Wipe body with cold cloth to reduce fever quickly.</p>
<p class="tamil">குளிர்ந்த துணியால் உடலை துடைப்பது காய்ச்சலை குறைக்க உதவுகிறது.</p>
</div>
`
},

cold:{
title:"🤧 Cold & Cough (சளி மற்றும் இருமல்)",
content:`
<div class="section">
<p>Cold and cough affect nose and throat due to infection.</p>
<p class="tamil">சளி மற்றும் இருமல் மூக்கு மற்றும் தொண்டையை பாதிக்கும் தொற்று.</p>
</div>

<div class="section">
<p>Drink ginger and tulsi tea to clear throat.</p>
<p class="tamil">இஞ்சி துளசி தேநீர் குடிப்பது தொண்டையை சுத்தப்படுத்தும்.</p>
</div>

<div class="section">
<p>Steam inhalation gives instant relief from blocked nose.</p>
<p class="tamil">நீராவி சுவாசம் மூக்கடைப்பை உடனடியாக சரிசெய்கிறது.</p>
</div>
`
},

headache:{
title:"🤕 Headache (தலைவலி)",
content:`
<div class="section">
<p>Headache is pain caused by stress or tiredness.</p>
<p class="tamil">தலைவலி மன அழுத்தம் அல்லது சோர்வால் ஏற்படும் வலி.</p>
</div>

<div class="section">
<p>Apply coconut oil with camphor for relief.</p>
<p class="tamil">தேங்காய் எண்ணெய் மற்றும் கற்பூரம் தடவினால் நிவாரணம் கிடைக்கும்.</p>
</div>
`
}

};

const params = new URLSearchParams(window.location.search);
const disease = params.get("name");

const data = diseases[disease];

document.getElementById("title").innerText =
data ? data.title : "Disease Not Found";

document.getElementById("content").innerHTML =
data ? data.content : "";
</script>

</body>
</html>
