<script>

const diseases = {

fever:{
title:"🤒 Fever (காய்ச்சல்)",
content:`
<div class="section">
<p>Fever is a condition where body temperature increases due to infection or illness.</p>
<p class="tamil">காய்ச்சல் என்பது உடல் வெப்பம் அதிகரிக்கும் நிலை ஆகும்.</p>
</div>

<div class="section">
<p>Drinking coriander seed water helps to reduce body heat naturally.</p>
<p class="tamil">கொத்தமல்லி கஷாயம் குடிப்பது உடல் சூட்டை குறைக்க உதவுகிறது.</p>
</div>

<div class="section">
<p>Drinking honey mixed with warm water gives energy and soothes the body.</p>
<p class="tamil">தேன் கலந்த சூடான நீர் குடிப்பது உடலுக்கு சக்தி அளித்து நிம்மதி தருகிறது.</p>
</div>

<div class="section">
<p>Wiping the body with cold water cloth helps to bring down fever.</p>
<p class="tamil">குளிர்ந்த நீர் துணியால் உடலை துடைப்பது காய்ச்சலை குறைக்க உதவுகிறது.</p>
</div>
`
},

cold:{
title:"🤧 Cold and Cough (சளி மற்றும் இருமல்)",
content:`
<div class="section">
<p>Cold and cough are common infections that affect the nose and throat.</p>
<p class="tamil">சளி மற்றும் இருமல் என்பது மூக்கு மற்றும் தொண்டையை பாதிக்கும் பொதுவான தொற்று.</p>
</div>

<div class="section">
<p>Drinking ginger and tulsi tea helps to clear throat and reduce cough.</p>
<p class="tamil">இஞ்சி மற்றும் துளசி தேநீர் குடிப்பது தொண்டை சுத்தமாகி இருமலை குறைக்கிறது.</p>
</div>

<div class="section">
<p>Honey with pepper helps to reduce dry cough naturally.</p>
<p class="tamil">தேன் மற்றும் மிளகு சேர்த்து எடுத்தால் உலர் இருமல் குறையும்.</p>
</div>

<div class="section">
<p>Steam inhalation helps to open blocked nose and gives instant relief.</p>
<p class="tamil">நீராவி சுவாசம் மூக்கடைப்பை திறந்து உடனடி நிம்மதி தருகிறது.</p>
</div>
`
},

headache:{
title:"🤕 Headache (தலைவலி)",
content:`
<div class="section">
<p>Headache is pain in the head caused by stress, fever, or tiredness.</p>
<p class="tamil">தலைவலி என்பது மன அழுத்தம், காய்ச்சல் அல்லது சோர்வு காரணமாக ஏற்படும் வலி.</p>
</div>

<div class="section">
<p>Applying coconut oil mixed with camphor helps to reduce headache.</p>
<p class="tamil">தேங்காய் எண்ணெய் மற்றும் கற்பூரம் கலந்து தடவினால் தலைவலி குறையும்.</p>
</div>

<div class="section">
<p>Drinking ginger tea improves blood flow and reduces pain.</p>
<p class="tamil">இஞ்சி தேநீர் குடிப்பது இரத்த ஓட்டத்தை மேம்படுத்தி வலியை குறைக்கிறது.</p>
</div>
`
},
migraine:{
title:"🌸 Migraine (மைக்ரேன்)",
content:`
<div class="section">
<p>Migraine is a severe headache often with nausea and sensitivity to light.</p>
<p class="tamil">மைக்ரேன் என்பது ஒளி உணர்வுடன் கூடிய கடுமையான தலைவலி ஆகும்.</p>
</div>

<div class="section">
<p>Dry ginger paste with milk helps to reduce migraine pain naturally.</p>
<p class="tamil">உலர் இஞ்சி பால் கலவை மைக்ரேன் வலியை குறைக்க உதவுகிறது.</p>
</div>

<div class="section">
<p>Apply the paste on forehead for relief.</p>
<p class="tamil">இந்த கலவையை நெற்றியில் தடவினால் நிவாரணம் கிடைக்கும்.</p>
</div>

<div class="section">
<p>Rest in a dark and quiet room to reduce headache intensity.</p>
<p class="tamil">இருண்ட அமைதியான அறையில் ஓய்வெடுப்பது வலியை குறைக்கும்.</p>
</div>
`
},

stomachache:{
title:"🍲 Stomach Ache (வயிற்று வலி)",
content:`
<div class="section">
<p>Stomach ache is pain in the abdomen due to digestion problems.</p>
<p class="tamil">வயிற்று வலி என்பது செரிமான பிரச்சனையால் ஏற்படும் வலி.</p>
</div>

<div class="section">
<p>Drinking cumin water helps in digestion and reduces pain.</p>
<p class="tamil">சீரக நீர் குடிப்பது செரிமானத்தை மேம்படுத்தி வலியை குறைக்கிறது.</p>
</div>

<div class="section">
<p>Fennel seed water helps to reduce gas and stomach discomfort.</p>
<p class="tamil">சோம்பு நீர் வாயு மற்றும் வயிற்று உப்புசத்தை குறைக்கிறது.</p>
</div>
`
},

acidity:{
title:"🔥 Acidity (அசிடிட்டி)",
content:`
<div class="section">
<p>Acidity is caused by excess acid in the stomach.</p>
<p class="tamil">அசிடிட்டி என்பது வயிற்றில் அதிக அமிலம் உருவாகும் நிலை.</p>
</div>

<div class="section">
<p>Buttermilk helps to cool the stomach and reduce acidity.</p>
<p class="tamil">மோர் குடிப்பது வயிற்றை குளிர்வித்து அசிடிட்டியை குறைக்கிறது.</p>
</div>

<div class="section">
<p>Banana helps to balance stomach acid naturally.</p>
<p class="tamil">வாழைப்பழம் வயிற்று அமிலத்தை சமப்படுத்த உதவுகிறது.</p>
</div>

<div class="section">
<p>Avoid oily and spicy foods to prevent acidity.</p>
<p class="tamil">எண்ணெய் மற்றும் கார உணவுகளை தவிர்ப்பது அசிடிட்டியை தடுக்கிறது.</p>
</div>
`
},

constipation:{
title:"🌿 Constipation (மலச்சிக்கல்)",
content:`
<div class="section">
<p>Constipation is difficulty in passing stools regularly.</p>
<p class="tamil">மலச்சிக்கல் என்பது மலத்தை சீராக வெளியேற்ற முடியாத நிலை.</p>
</div>

<div class="section">
<p>Drinking warm water in the morning helps digestion.</p>
<p class="tamil">காலை சூடான நீர் குடிப்பது செரிமானத்தை மேம்படுத்துகிறது.</p>
</div>

<div class="section">
<p>Eating fiber-rich fruits and vegetables helps bowel movement.</p>
<p class="tamil">நார்ச்சத்து நிறைந்த பழங்கள் மற்றும் காய்கறிகள் குடல் இயக்கத்தை மேம்படுத்தும்.</p>
</div>

<div class="section">
<p>Soaked raisins help to improve digestion naturally.</p>
<p class="tamil">நனைத்த உலர் திராட்சை செரிமானத்தை இயற்கையாக மேம்படுத்துகிறது.</p>
</div>
`
},

diarrhoea:{
title:"🚰 Diarrhoea (வயிற்றுப்போக்கு)",
content:`
<div class="section">
<p>Diarrhoea is frequent loose motion caused by infection or food issues.</p>
<p class="tamil">வயிற்றுப்போக்கு என்பது தொற்று அல்லது உணவு காரணமாக ஏற்படும் தளர்ந்த மலம்.</p>
</div>

<div class="section">
<p>Drinking rice porridge helps to restore energy.</p>
<p class="tamil">கஞ்சி குடிப்பது உடலுக்கு சக்தி தருகிறது.</p>
</div>

<div class="section">
<p>Buttermilk helps to cool the stomach and control motion.</p>
<p class="tamil">மோர் குடிப்பது வயிற்றை குளிர்வித்து கட்டுப்படுத்துகிறது.</p>
</div>

<div class="section">
<p>Drink plenty of water to avoid dehydration.</p>
<p class="tamil">நீரிழப்பு ஏற்படாமல் நிறைய தண்ணீர் குடிக்க வேண்டும்.</p>
</div>
`
},

asthma:{
title:"💨 Asthma (ஆஸ்துமா)",
content:`
<div class="section">
<p>Asthma is a breathing problem caused by blocked airways.</p>
<p class="tamil">ஆஸ்துமா என்பது காற்றுப்பாதை அடைபடுவதால் ஏற்படும் சுவாச பிரச்சனை.</p>
</div>

<div class="section">
<p>Drinking tulsi water helps to improve breathing.</p>
<p class="tamil">துளசி நீர் குடிப்பது சுவாசத்தை மேம்படுத்துகிறது.</p>
</div>

<div class="section">
<p>Practicing pranayama improves lung capacity.</p>
<p class="tamil">சுவாச பயிற்சி நுரையீரல் திறனை மேம்படுத்துகிறது.</p>
</div>

<div class="section">
<p>Avoid dust and smoke to prevent attacks.</p>
<p class="tamil">தூசி மற்றும் புகையை தவிர்ப்பது தாக்கத்தை குறைக்கிறது.</p>
</div>
`
},

allergy:{
title:"🌿 Skin Allergy (தோல் அலர்ஜி)",
content:`
<div class="section">
<p>Skin allergy is irritation or rash on the skin.</p>
<p class="tamil">தோல் அலர்ஜி என்பது தோலில் ஏற்படும் அரிப்பு அல்லது சிரங்கு.</p>
</div>

<div class="section">
<p>Applying aloe vera gel soothes the skin.</p>
<p class="tamil">ஆலோவேரா ஜெல் தோலை குளிர்வித்து நிம்மதி தருகிறது.</p>
</div>

<div class="section">
<p>Turmeric paste helps to reduce infection and inflammation.</p>
<p class="tamil">மஞ்சள் பூச்சு தொற்று மற்றும் வீக்கத்தை குறைக்கிறது.</p>
</div>

<div class="section">
<p>Neem paste helps to clear skin infections.</p>
<p class="tamil">வேப்பிலை விழுது தோல் தொற்றை நீக்குகிறது.</p>
</div>
`
},
    
insomnia:{
title:"😴 Insomnia (தூக்கமின்மை)",
content:`
<div class="section">
<p>Insomnia is difficulty in falling asleep or staying asleep.</p>
<p class="tamil">தூக்கமின்மை என்பது சரியாக தூங்க முடியாத நிலையாகும்.</p>
</div>

<div class="section">
<p>Drinking warm milk before bedtime helps to improve sleep quality.</p>
<p class="tamil">தூங்குவதற்கு முன் வெதுவெதுப்பான பால் குடிப்பது நல்ல தூக்கத்திற்கு உதவுகிறது.</p>
</div>

<div class="section">
<p>Avoid mobile phones and bright screens before sleep.</p>
<p class="tamil">தூங்குவதற்கு முன் மொபைல் மற்றும் பிரகாசமான திரைகளை தவிர்க்கவும்.</p>
</div>
`
},

toothache:{
title:"🦷 Toothache (பல் வலி)",
content:`
<div class="section">
<p>Toothache is pain in or around a tooth caused by infection or decay.</p>
<p class="tamil">பல் வலி என்பது பல் தொற்று அல்லது சேதத்தால் ஏற்படும் வலியாகும்.</p>
</div>

<div class="section">
<p>Rinsing the mouth with warm salt water helps reduce pain and swelling.</p>
<p class="tamil">சூடான உப்பு நீரால் வாய் கொப்பளிப்பது வலி மற்றும் வீக்கத்தை குறைக்க உதவும்.</p>
</div>

<div class="section">
<p>Applying clove oil on the affected tooth may provide temporary relief.</p>
<p class="tamil">கிராம்பு எண்ணெயை வலிக்கும் பல்லில் தடவினால் தற்காலிக நிவாரணம் கிடைக்கும்.</p>
</div>
`
},

nausea:{
title:"🤢 Nausea (குமட்டல்)",
content:`
<div class="section">
<p>Nausea is the feeling of wanting to vomit.</p>
<p class="tamil">குமட்டல் என்பது வாந்தி வருவது போன்ற உணர்வாகும்.</p>
</div>

<div class="section">
<p>Sipping ginger tea can help calm the stomach.</p>
<p class="tamil">இஞ்சி தேநீர் குடிப்பது வயிற்றை அமைதிப்படுத்த உதவுகிறது.</p>
</div>

<div class="section">
<p>Eat light foods and drink plenty of water.</p>
<p class="tamil">எளிதில் செரிக்கும் உணவுகளை சாப்பிட்டு அதிக தண்ணீர் குடிக்கவும்.</p>
</div>
`
},

earpain:{
title:"👂 Ear Pain (காது வலி)",
content:`
<div class="section">
<p>Ear pain may occur due to infection, cold, or wax buildup.</p>
<p class="tamil">காது வலி தொற்று, சளி அல்லது காதில் மெழுகு சேர்வதால் ஏற்படலாம்.</p>
</div>

<div class="section">
<p>Applying a warm compress around the ear may help reduce discomfort.</p>
<p class="tamil">காதின் வெளியே வெதுவெதுப்பான ஒத்தடம் கொடுப்பது நிவாரணம் தரலாம்.</p>
</div>

<div class="section">
<p>Seek medical advice if pain becomes severe.</p>
<p class="tamil">வலி அதிகரித்தால் மருத்துவரை அணுகவும்.</p>
</div>
`
},

vomiting:{
title:"🤮 Vomiting (வாந்தி)",
content:`
<div class="section">
<p>Vomiting is the forceful emptying of stomach contents through the mouth.</p>
<p class="tamil">வாந்தி என்பது வயிற்றிலுள்ள உணவு வெளியேறும் நிலையாகும்.</p>
</div>

<div class="section">
<p>Drink small amounts of water frequently to stay hydrated.</p>
<p class="tamil">நீரிழப்பு ஏற்படாமல் சிறிது சிறிதாக தண்ணீர் குடிக்கவும்.</p>
</div>

<div class="section">
<p>Ginger tea may help reduce nausea and vomiting.</p>
<p class="tamil">இஞ்சி தேநீர் குமட்டல் மற்றும் வாந்தியை குறைக்க உதவும்.</p>
</div>
`
}

};

const params = new URLSearchParams(window.location.search);
const disease = params.get("name");

const data = diseases[disease];

document.getElementById("title").innerText =
data ? data.title : "Disease Not Found";

document.getElementById("content").innerHTML =
data ? data.content : "";
</script>
